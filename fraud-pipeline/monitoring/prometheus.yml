global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'prometheus'

    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'

    static_configs:
      - targets: ['redis:6379']

  - job_name: 'fraud_producer'

    static_configs:
      - targets: ['host.docker.internal:8000']